checkpoint:
  bundled: false
  default_name: elfnet.ckpt

model:
  class_name: ELFPredictor
  backbone: ResidualUNet3D
  input_channels: 1
  output_channels: 1
  base: 16
  depth: 4
  uses_symmetry: false
  uses_patch_inference: false
  pad_multiple: 16

loss:
  lambda_vox: 1.0
  lambda_grad: 0.2
  lambda_cdf: 0.05
  cdf_bins: 64
  cdf_sigma: 0.02
  cdf_tail_start: 0.60
  cdf_tail_weight: 2.0
  cdf_max_voxels: 200000
  delta: 0.1
  aux_weight: 0.3
  gamma_w: 2.0

training:
  lr: 0.0006
  weight_decay: 0.0001
  optimizer: AdamW
  scheduler: OneCycleLR
  batch_per_gpu: 32
  global_batch_8gpu: 256
  batching: shape
  max_epochs: 100
  val_frac: 0.05
  precision: bf16-mixed
  data_mode: full_grid_shape_bucketed_sad_elf

inference:
  encut: 680
  prec: Accurate
  mode: full_grid
  output_prefix: ELFCAR_
